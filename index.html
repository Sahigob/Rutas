<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Rutas Comerciales PRO v2.4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --bg-main: #f1f5f9;
  --sidebar-bg: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}

* { transition: all 0.2s ease; }

body { 
    margin: 0; 
    font-family: 'Inter', sans-serif; 
    display: flex; 
    flex-direction: row; 
    height: 100vh; 
    background: var(--bg-main); 
    color: var(--text-main); 
}

/* Map Styling */
#map { flex: 1; height: 100%; z-index: 1; }

/* Sidebar/Panel Styling */
#panel { 
    width: 420px; 
    padding: 0; 
    overflow-y: auto; 
    background: var(--sidebar-bg); 
    border-left: 1px solid var(--border); 
    box-shadow: -10px 0 20px rgba(0,0,0,0.03); 
    z-index: 10; 
    display: flex;
    flex-direction: column;
}

.panel-header {
    padding: 24px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 20;
}

.panel-content { padding: 20px; }

h3 { 
    margin: 0 0 16px 0; 
    font-size: 0.95rem; 
    text-transform: uppercase; 
    letter-spacing: 0.05em;
    color: var(--text-muted);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Cards */
.card { 
    background: white; 
    border: 1px solid var(--border); 
    border-radius: 16px; 
    padding: 20px; 
    margin-bottom: 20px; 
    box-shadow: var(--card-shadow);
}

.card:hover { border-color: #cbd5e1; }

/* Forms */
input, select, textarea { 
    width: 100%; 
    margin: 6px 0 12px 0; 
    padding: 12px 16px; 
    border-radius: 10px; 
    border: 1px solid var(--border); 
    box-sizing: border-box; 
    font-size: 14px; 
    background: #f8fafc;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; display: block; }

/* Buttons */
button { 
    width: 100%; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; 
    font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px;
    padding: 12px 20px; background: var(--primary); color: white;
}

button:hover { background: var(--primary-hover); transform: translateY(-1px); }
button:active { transform: translateY(0); }

#btnRutaOrdenEstricto { background: #f59e0b; color: white; }
#btnRutaOrdenEstricto:hover { background: #d97706; }

.smallBtn { padding: 8px 14px; font-size: 12px; width: auto; display: inline-flex; border-radius: 8px; border: 1px solid var(--border); background: white; color: var(--text-main); }
.deleteBtn { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
.deleteBtn:hover { background: #ef4444; color: white; }
.saveBtn { background: #10b981; color: white; }

/* Client & Route Lists */
.client { 
    padding: 16px; 
    background: white; 
    margin-bottom: 12px; 
    border-radius: 14px; 
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
}

.client:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

.edit-mode { 
    border: 2px solid var(--primary); 
    background: #f0f9ff; 
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.2); }
    70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
}

.stats-badge { 
    background: var(--primary); 
    color: white; 
    padding: 2px 10px; 
    border-radius: 20px; 
    font-size: 0.75rem; 
    margin-left: auto;
}

.routeItem { 
    display: flex; justify-content: space-between; align-items: center; 
    margin-bottom: 10px; font-size: 13px; background: #f8fafc; 
    padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
}

/* Custom Scrollbar */
#panel::-webkit-scrollbar { width: 6px; }
#panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

/* UI Fixes */
.flex-row { display: flex; gap: 8px; }
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

@media (max-width: 768px) { 
    body { flex-direction: column; } 
    #map { flex: none; height: 300px; } 
    #panel { width: 100%; flex: 1; border-left: none; }
}

.debug-box { background: #0f172a; color: #38bdf8; font-family: 'Courier New', monospace; padding: 12px; border-radius: 10px; font-size: 11px; margin-top: 10px; opacity: 0.9; }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="panel-header">
    <h2 style="margin:0; font-size: 1.25rem; font-weight: 800; color: var(--primary);">PRO ROUTES <span style="font-weight: 300; color: #94a3b8;">v2.4</span></h2>
  </div>

  <div class="panel-content">
      <div class="card">
        <h3><i class="fas fa-lock"></i> Acceso Local</h3>
        <input id="email" placeholder="Correo electrónico" />
        <input id="password" type="password" placeholder="Contraseña" />
        <button id="btnLogin"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
      </div>

      <div class="card">
        <h3><i class="fas fa-user-plus"></i> Nuevo Cliente</h3>
        <input id="name" placeholder="Nombre completo" />
        <input id="address" placeholder="Dirección (Calle, Ciudad...)" />
        <textarea id="notes" placeholder="Notas (Tipo de negocio, horario...)" rows="2"></textarea>
        <div class="flex-row">
            <input id="lat" placeholder="Latitud" />
            <input id="lng" placeholder="Longitud" />
        </div>
        <button id="btnAddClient"><i class="fas fa-save"></i> Guardar en base de datos</button>
      </div>

      <div class="card">
        <h3><i class="fas fa-map-marked-alt"></i> Planificar Ruta</h3>
        <label>FECHA DE VISITA</label>
        <input type="date" id="routeDate" />
        <label>PUNTO DE PARTIDA</label>
        <select id="startOption">
          <option value="gps">📍 Mi ubicación actual</option>
          <option value="manual">✏️ Dirección personalizada</option>
        </select>
        <input id="startAddress" placeholder="Escribe dirección de salida" style="display:none"/>
        <button id="btnCreateRoute" style="background: #4f46e5;"><i class="fas fa-route"></i> Calcular Ruta Optimizado</button>
        <div id="debugOrder" class="debug-box" style="display:none"></div>
        <div id="routeList" style="margin-top: 15px;"></div>
      </div>

      <div class="card">
        <h3><i class="fas fa-location-arrow"></i> Navegación Directa</h3>
        <div class="btn-group">
            <button id="btnRutaOrdenEstricto" title="Seguir orden de la lista"><i class="fas fa-list-ol"></i> Google</button>
            <button id="btnGoogleMaps" style="background: #22c55e;"><i class="fab fa-google"></i> Smart</button>
        </div>
        <div class="btn-group" style="margin-top:8px;">
            <button id="btnWaze" style="background: #33b1ff;"><i class="fab fa-waze"></i> Waze</button>
            <button id="btnClearRoute" style="background: #94a3b8;"><i class="fas fa-eraser"></i> Limpiar</button>
        </div>
      </div>

      <h3 style="padding: 0 10px;">
          <i class="fas fa-users"></i> Listado de Clientes 
          <span id="stats" class="stats-badge">0</span>
      </h3>
      <div id="clientList" style="padding: 0 10px 40px 10px;"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

const firebaseConfig = { apiKey: "AIzaSyALty_4SfeZUg6B6_dbcOeZvGYpnu4gYsE", authDomain: "rutas-56f86.firebaseapp.com", projectId: "rutas-56f86", storageBucket: "rutas-56f86.appspot.com", messagingSenderId: "1026881492897", appId: "1:1026881492897:web:fcb315b53fcf5e40e3dde0" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const coleccionClientes = collection(db,"clientes");
const coleccionRutas = collection(db,"rutas");

let clients=[], markers=[], redMarkers=[], routeLine, lastRouteCoords=[], lastRouteClients=[];
let editingClientId = null, currentStartOption = "gps";

const iconNormal = new L.Icon({ iconUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png", iconSize:[25,41], iconAnchor:[12,41] });
const iconFood = new L.Icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448609.png", iconSize:[38,38], iconAnchor:[19,38] });
const iconHotel = new L.Icon({ 
    iconUrl: "data:image/svg+xml;base64," + btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 38 38"><circle cx="19" cy="19" r="18" fill="#ff9900" stroke="white" stroke-width="2"/><text x="50%" y="55%" font-size="18" text-anchor="middle" fill="black" font-family="Arial" font-weight="bold" dominant-baseline="middle">H</text></svg>`), 
    iconSize:[38,38], iconAnchor:[19,38] 
});
const iconPin = new L.Icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png", iconSize:[32,32], iconAnchor:[16,32] });
const iconUser = new L.Icon({ iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png", iconSize:[40,40], iconAnchor:[20,40] });

function getClientIcon(cliente){
  const text=(cliente.notes||"").toLowerCase();
  if(text.includes("comida")||text.includes("bar")||text.includes("restaurante")) return iconFood;
  if(text.includes("hotel")||text.includes("hostal")||text.includes("dormir")) return iconHotel;
  return iconNormal;
}

let map = L.map('map').setView([40.4168,-3.7038],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function geocode(addr){ let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`); let data=await res.json(); return data.length>0 ? {lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon)} : null; }

async function cargarClientes(){ 
    const snapshot=await getDocs(coleccionClientes); 
    clients=snapshot.docs.map(d=>({...d.data(),id:d.id})).filter(c=>c.name); 
    clients.sort((a,b)=>a.name.localeCompare(b.name)); 
    renderClientes(); 
}

async function cargarRutas(){ 
    const snapshot=await getDocs(coleccionRutas); 
    const container=document.getElementById('routeList'); container.innerHTML=""; 
    snapshot.docs.forEach(docSnap => {
        const r = docSnap.data();
        let div=document.createElement('div'); div.className="routeItem";
        div.innerHTML=`<span>📅 ${r.date || 'Sin fecha'}</span> 
            <div style="display:flex; gap:5px">
                <button class="smallBtn" onclick="loadRoute('${docSnap.id}')"><i class="fas fa-eye"></i></button>
                <button class="smallBtn deleteBtn" onclick="deleteRoute('${docSnap.id}')"><i class="fas fa-trash"></i></button>
            </div>`;
        container.appendChild(div);
    });
}

function renderClientes(){ 
    const container=document.getElementById('clientList'); container.innerHTML=""; 
    markers.forEach(m=>map.removeLayer(m)); markers=[]; 
    clients.forEach((c,i)=>{ 
        let div=document.createElement('div'); div.className='client'; 
        
        if(editingClientId === c.id) {
            div.classList.add('edit-mode');
            div.innerHTML = `
                <input id="edit_name" value="${c.name||''}" placeholder="Nombre" />
                <input id="edit_address" value="${c.address||''}" placeholder="Dirección" />
                <textarea id="edit_notes" rows="2" placeholder="Notas">${c.notes||''}</textarea>
                <div class="flex-row">
                    <input id="edit_lat" value="${c.lat||''}" placeholder="Lat" />
                    <input id="edit_lng" value="${c.lng||''}" placeholder="Lng" />
                </div>
                <div style="display:flex; gap:8px; margin-top:8px">
                    <button class="smallBtn saveBtn" onclick="saveEditClient('${c.id}')">💾 Guardar</button>
                    <button class="smallBtn" style="background:#64748b; color:white;" onclick="cancelEdit()">❌</button>
                </div>`;
        } else {
            div.innerHTML=`<div style="display:flex; align-items:flex-start; gap:12px">
                    <input type="checkbox" id="c${i}" data-id="${c.id}" style="width:20px; height:20px; margin-top:2px; cursor:pointer;"> 
                    <div style="flex:1">
                        <div style="font-weight:700; font-size:15px; color:var(--text-main)">${c.name}</div>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:2px;"><i class="fas fa-map-marker-alt"></i> ${c.address||'Sin dirección'}</div>
                    </div>
                </div>
                <div style="margin-top:12px; display:flex; gap:8px; padding-left:32px;">
                    <button class="smallBtn" onclick='editClient("${c.id}")'><i class="fas fa-edit"></i> Editar</button>
                    <button class="smallBtn deleteBtn" onclick='deleteClient("${c.id}")'><i class="fas fa-trash-alt"></i></button>
                </div>`;
        }
        container.appendChild(div);

        if(c.lat && c.lng){ 
            const defaultIcon = getClientIcon(c);
            let m = L.marker([c.lat,c.lng], {icon: defaultIcon}).addTo(map).bindPopup(c.name);
            const updateMarkerIcon = (checked) => { m.setIcon(checked ? iconPin : defaultIcon); };
            m.on('click', () => { 
                const cb = document.getElementById('c'+i); 
                cb.checked = !cb.checked; 
                updateMarkerIcon(cb.checked); 
            });
            setTimeout(() => {
                const cb = document.getElementById('c'+i);
                if(cb) cb.addEventListener('change', () => updateMarkerIcon(cb.checked));
            }, 100);
            markers.push(m);
        }
    }); 
    document.getElementById('stats').innerHTML=clients.length; 
}

window.editClient=function(id){ 
    editingClientId = id;
    renderClientes(); 
}

window.cancelEdit=function(){
    editingClientId = null;
    renderClientes();
}

window.saveEditClient=async function(id){
    const name = document.getElementById('edit_name').value.trim();
    const address = document.getElementById('edit_address').value.trim();
    const notes = document.getElementById('edit_notes').value.trim();
    const latIn = document.getElementById('edit_lat').value;
    const lngIn = document.getElementById('edit_lng').value;

    if(!name) return alert("Pon nombre");
    let lat, lng;
    if(latIn && lngIn){ lat=parseFloat(latIn); lng=parseFloat(lngIn); }
    else if(address){ const co=await geocode(address); if(!co) return alert("No encontrada"); lat=co.lat; lng=co.lng; }
    
    try {
        await updateDoc(doc(db,"clientes",id),{name,address,lat,lng,notes}); 
        editingClientId = null;
        cargarClientes();
    } catch(e) { alert("Error: " + e.message); }
}

window.deleteClient=async function(id){ if(confirm("¿Borrar cliente?")) { await deleteDoc(doc(db,"clientes",id)); cargarClientes(); } };
window.deleteRoute=async function(id){ if(confirm("¿Borrar esta ruta del historial?")) { await deleteDoc(doc(db,"rutas",id)); cargarRutas(); } };

window.addClient=async function(){ 
    const name=document.getElementById('name').value.trim(), address=document.getElementById('address').value.trim(), notes=document.getElementById('notes').value.trim(), latIn=document.getElementById('lat').value, lngIn=document.getElementById('lng').value;
    if(!name) return alert("Pon nombre");
    let lat, lng;
    if(latIn && lngIn){ lat=parseFloat(latIn); lng=parseFloat(lngIn); }
    else if(address){ const co=await geocode(address); if(!co) return alert("No encontrada"); lat=co.lat; lng=co.lng; }
    else { try { const pos=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j)); lat=pos.coords.latitude; lng=pos.coords.longitude; } catch(e){ return alert("GPS error"); } }
    try {
        await addDoc(coleccionClientes,{name,address,lat,lng,notes}); 
        document.getElementById('name').value=""; document.getElementById('address').value=""; document.getElementById('notes').value=""; document.getElementById('lat').value=""; document.getElementById('lng').value="";
        cargarClientes();
    } catch(e) { alert("Error: " + e.message); }
}

window.createRoute=async function(){ 
    let sel=clients.filter((c,i)=>document.getElementById('c'+i)?.checked); 
    if(sel.length<1) return alert("Selecciona clientes"); 
    currentStartOption = document.getElementById('startOption').value;
    let sLat, sLng;
    if(currentStartOption==="gps"){ 
        if(userMarker){ const pos=userMarker.getLatLng(); sLat=pos.lat; sLng=pos.lng; } 
        else { const p=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j)); sLat=p.coords.latitude; sLng=p.coords.longitude; }
    } else { 
        let ad=document.getElementById('startAddress').value.trim(); if(!ad) return alert("Salida vacía"); const c=await geocode(ad); if(!c) return alert("No válida"); sLat=c.lat; sLng=c.lng; 
    }
    
    const inputCoords = [[sLat,sLng],...sel.map(c=>[c.lat,c.lng])];
    const strCoords = inputCoords.map(c => `${c[1]},${c[0]}`).join(';');
    
    try {
        const response = await fetch(`https://router.project-osrm.org/trip/v1/driving/${strCoords}?source=first&destination=last&roundtrip=false&overview=full&geometries=geojson`);
        const data = await response.json();
        
        if(data.waypoints) {
            lastRouteClients = data.waypoints
                .sort((a, b) => a.waypoint_index - b.waypoint_index)
                .map(w => {
                   if(w.waypoint_index === 0) return { name: "Inicio", lat: sLat, lng: sLng, address: (currentStartOption === "manual" ? document.getElementById('startAddress').value : "") };
                   return sel[w.waypoint_index - 1];
                });

            lastRouteCoords = lastRouteClients.map(c => [c.lat, c.lng]);

            if(routeLine) map.removeLayer(routeLine); redMarkers.forEach(m=>map.removeLayer(m)); redMarkers=[];
            routeLine=L.geoJSON(data.trips[0].geometry,{style:{color:'#2563eb',weight:6,opacity:0.8}}).addTo(map); 
            map.fitBounds(routeLine.getBounds());
            lastRouteCoords.slice(1).forEach(c=>{ redMarkers.push(L.circleMarker(c,{radius:6,color:'red',fillColor:'#fff',fillOpacity:1,weight:2}).addTo(map)); });
            
            await addDoc(coleccionRutas,{date:document.getElementById('routeDate').value, clients:sel.map(c=>c.id), start:{lat:sLat,lng:sLng}, mode:currentStartOption});
            cargarRutas();
        }
    } catch(e) { alert("Error OSRM: " + e.message); }
}

window.loadRoute=async function(id){ 
    const sn=await getDocs(coleccionRutas); const rd=sn.docs.find(d=>d.id===id); if(!rd)return;
    const d=rd.data(); 
    clients.forEach((c, i) => { const cb = document.getElementById('c'+i); if(cb) cb.checked = false; });
    d.clients.forEach(cid => {
        const idx = clients.findIndex(c => c.id === cid);
        if(idx !== -1) {
            const cb = document.getElementById('c'+idx);
            if(cb) { cb.checked = true; markers[idx].setIcon(iconPin); }
        }
    });
    currentStartOption = d.mode || "gps";
    if(d.mode === "manual") {
        document.getElementById('startOption').value = "manual";
        document.getElementById('startAddress').style.display = "block";
        document.getElementById('startAddress').value = "Cargando...";
    }
    window.createRoute();
}

function getGoogleMapsUrl() {
    if (lastRouteClients.length < 2) return null;
    const origin = (currentStartOption === "gps") ? "" : encodeURIComponent(lastRouteClients[0].address || `${lastRouteClients[0].lat},${lastRouteClients[0].lng}`);
    const lastIdx = lastRouteClients.length - 1;
    const destClient = lastRouteClients[lastIdx];
    const destination = (destClient.address && destClient.address.trim() !== "") ? encodeURIComponent(destClient.address) : `${destClient.lat},${destClient.lng}`;
    let waypoints = "";
    if (lastRouteClients.length > 2) {
        waypoints = lastRouteClients.slice(1, -1).map(c => {
            return (c.address && c.address.trim() !== "") ? encodeURIComponent(c.address) : `${c.lat},${c.lng}`;
        }).join('|');
    }
    return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}

window.enviarRutaGoogleOrdenEstricto = function() {
    const url = getGoogleMapsUrl();
    if(url) window.open(url, '_blank');
    else alert("Crea una ruta primero");
}

window.openInGoogleMaps = function(){ 
    const url = getGoogleMapsUrl();
    if(url) window.open(url, '_blank');
    else alert("Crea una ruta primero");
}

window.openInWaze = function() {
    if(lastRouteCoords.length < 2) return alert("Crea o carga una ruta");
    const dest = lastRouteCoords[lastRouteCoords.length - 1];
    const url = `https://waze.com/ul?ll=${dest[0]},${dest[1]}&navigate=yes`;
    window.open(url, '_blank');
}

window.login=async function(){ 
    try { await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('password').value); alert("Login OK"); cargarClientes(); cargarRutas(); showUserPosition(); } catch(e){ alert("Error: "+e.message); }
}

let userMarker = null;
async function showUserPosition() {
    try {
        const pos = await new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(resolve, reject));
        const lat = pos.coords.latitude; const lng = pos.coords.longitude;
        if(userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lng], {icon: iconUser}).addTo(map).bindPopup("📍 Tú estás aquí");
        map.setView([lat, lng], 13);
    } catch(e) { console.warn("No se pudo obtener la ubicación: ", e); }
}

document.addEventListener("DOMContentLoaded",()=>{
    document.getElementById('btnLogin').addEventListener('click',login);
    document.getElementById('btnAddClient').addEventListener('click',addClient);
    document.getElementById('btnCreateRoute').addEventListener('click',createRoute);
    document.getElementById('btnRutaOrdenEstricto').addEventListener('click',window.enviarRutaGoogleOrdenEstricto);
    document.getElementById('btnGoogleMaps').addEventListener('click',window.openInGoogleMaps);
    document.getElementById('btnWaze').addEventListener('click',window.openInWaze);
    document.getElementById('btnClearRoute').addEventListener('click',()=>{ 
        if(routeLine)map.removeLayer(routeLine); 
        redMarkers.forEach(m=>map.removeLayer(m));
        if(document.getElementById('debugOrder')) document.getElementById('debugOrder').style.display = "none";
    });
    document.getElementById('startOption').addEventListener('change',e=>document.getElementById('startAddress').style.display=e.target.value==="manual"?"block":"none");
    cargarClientes(); 
    cargarRutas(); 
    showUserPosition();
});
</script>
</body>
</html>
